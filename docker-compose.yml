services:
  postgres:
    image: postgres:17-alpine
    container_name: ndr-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: haslo
      POSTGRES_DB: ndr
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ndr"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ndr-backend
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      DB_URL: postgresql+psycopg://postgres:haslo@postgres:5432/ndr
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_USE_MOCK: "false"
        VITE_API_BASE_URL: /api
    container_name: ndr-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  simulator:
    image: python:3.14
    container_name: ndr-live-simulator
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts:ro
    command: python scripts/live_simulator.py
    environment:
      LIVE_BACKEND_URL: http://backend:8000
      LIVE_SENSOR_KEY: demo-sensor-key
      LIVE_NORMAL_INTERVAL_SECONDS: 5
      LIVE_THREAT_INTERVAL_SECONDS: 30
      LIVE_THREAT_TYPES: port-scan,ssh-bruteforce,blacklist
    depends_on:
      backend:
        condition: service_started
    profiles:
      - live
    restart: unless-stopped

volumes:
  postgres-data:
